name: Release Service

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/owe-service
  DEVOPS_REPOSITORY: example/owe-devops
  DEVOPS_VALUES_FILE: charts/owe-staging/values.yaml

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout service repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install --upgrade pip setuptools wheel && python -m pip install --no-build-isolation -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Checkout devops repository
        if: ${{ secrets.DEVOPS_REPO_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DEVOPS_REPOSITORY }}
          token: ${{ secrets.DEVOPS_REPO_TOKEN }}
          path: devops

      - name: Update service image tag
        if: ${{ secrets.DEVOPS_REPO_TOKEN != '' }}
        env:
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import re
          values = Path("devops") / os.environ["DEVOPS_VALUES_FILE"]
          text = values.read_text()
          text = re.sub(
              r'(repository: ghcr\\.io/[^\\n]+/owe-service\\n\\s+tag: )[^\\n]+',
              rf'\g<1>{os.environ["VERSION_TAG"]}',
              text,
          )
          values.write_text(text)
          PY

      - name: Commit devops update
        if: ${{ secrets.DEVOPS_REPO_TOKEN != '' }}
        working-directory: devops
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ${{ env.DEVOPS_VALUES_FILE }}
          git commit -m "chore: release owe-service ${{ github.ref_name }}" || exit 0
          git push
